    // ═══════════════════════════════════════════════════════════
    // Color helpers
    // ═══════════════════════════════════════════════════════════
    function hexToInt(hex) { return parseInt(hex.replace('#',''), 16); }
    function toHex(v) {
        if (typeof v === 'string') {
            if (v.startsWith('#')) return v;
            if (v.startsWith('0x')) return '#' + v.slice(2).padStart(6,'0');
            return '#' + parseInt(v).toString(16).padStart(6,'0');
        }
        return '#' + v.toString(16).padStart(6,'0');
    }

    // ═══════════════════════════════════════════════════════════
    // Tool switching
    // ═══════════════════════════════════════════════════════════
    function setTool(name) {
        currentTool = name;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === name));
        const canvas = document.getElementById('preview');
        canvas.style.cursor = name === 'eraseWall'
            ? 'crosshair'
            : name === 'paintWall'
                ? 'crosshair'
            : name === 'placeStart'
                ? 'cell'
                : name === 'freehand'
                    ? 'crosshair'
                    : name === 'pan'
                        ? 'grab'
                        : 'default';
        updatePreview();
    }

    // ═══════════════════════════════════════════════════════════
    // Canvas mouse interactions
    // ═══════════════════════════════════════════════════════════
    (function() {
        const canvas = document.getElementById('preview');
        let hoveredWall = -1;
        let isPanning = false;
        let isPaintingWall = false;
        let wallPaintChanged = false;
        let panStartX = 0;
        let panStartY = 0;
        let panOriginX = 0;
        let panOriginY = 0;

        function drawWallPenOverlay() {
            const ctx = canvas.getContext('2d');
            if (wallPenPts.length < 2) return;
            for (let i = 1; i < wallPenPts.length; i++) {
                drawTireBarrierSegment(
                    ctx,
                    wallPenPts[i - 1].x,
                    wallPenPts[i - 1].y,
                    wallPenPts[i].x,
                    wallPenPts[i].y,
                    currentPreviewScale,
                    true
                );
            }
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (currentTool === 'pan') {
                isPanning = true;
                panStartX = mx;
                panStartY = my;
                panOriginX = previewPanX;
                panOriginY = previewPanY;
                canvas.style.cursor = 'grabbing';
            } else if (currentTool === 'paintWall') {
                isPaintingWall = true;
                wallPaintChanged = false;
                wallPenPts = [{ x: mx, y: my }];
            } else if (currentTool === 'eraseWall') {
                if (!lastBuildResult || !lastBuildResult.walls.length) return;
                const wi = findNearestWall(mx, my, 12);
                if (wi >= 0) {
                    if (erasedWalls.has(wi)) erasedWalls.delete(wi);
                    else erasedWalls.add(wi);
                    updatePreview();
                    commitEditorState();
                }
            } else if (currentTool === 'placeStart') {
                if (!lastBuildResult || !lastBuildResult.waypoints.length) return;
                // Find nearest waypoint to click
                const trackX = lastTx.inv(mx), trackY = lastTy.inv(my);
                let bestIdx = 0, bestD = Infinity;
                for (let i = 0; i < lastBuildResult.waypoints.length; i++) {
                    const wp = lastBuildResult.waypoints[i];
                    const d = (wp[0] - trackX) ** 2 + (wp[1] - trackY) ** 2;
                    if (d < bestD) { bestD = d; bestIdx = i; }
                }
                customStartLineIdx = bestIdx;
                updatePreview();
                commitEditorState();
            } else if (currentTool === 'freehand') {
                isDrawing = true;
                freehandPts = [{ x: mx, y: my }];
            } else if (currentTool === 'select') {
                const sec = findNearestSectionOnTrack(mx, my);
                if (sec >= 0) {
                    selIdx = sec;
                    renderSections();
                    updatePreview();
                }
            }
        });

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (currentTool === 'pan' && isPanning) {
                previewPanX = panOriginX + (mx - panStartX);
                previewPanY = panOriginY + (my - panStartY);
                updatePreview();
            } else if (currentTool === 'paintWall' && isPaintingWall) {
                wallPenPts.push({ x: mx, y: my });
                updatePreview();
                drawWallPenOverlay();
            } else if (currentTool === 'freehand' && isDrawing) {
                freehandPts.push({ x: mx, y: my });
                drawFreehandOverlay();
            } else if (currentTool === 'eraseWall') {
                const wi = findNearestWall(mx, my, 12);
                if (wi !== hoveredWall) {
                    hoveredWall = wi;
                    updatePreview();
                    if (wi >= 0) highlightWall(wi);
                }
            }
        });

        canvas.addEventListener('mouseup', e => {
            if (currentTool === 'pan' && isPanning) {
                isPanning = false;
                canvas.style.cursor = 'grab';
            } else if (currentTool === 'paintWall' && isPaintingWall) {
                isPaintingWall = false;
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
                const my = (e.clientY - rect.top) * (canvas.height / rect.height);
                const last = wallPenPts[wallPenPts.length - 1];
                if (!last || Math.abs(last.x - mx) > 1 || Math.abs(last.y - my) > 1) {
                    wallPenPts.push({ x: mx, y: my });
                }
                const segments = getCustomWallSegmentsFromStroke(wallPenPts);
                if (segments.length) {
                    customWalls.push(...segments);
                    wallPaintChanged = true;
                }
                wallPenPts = [];
                updatePreview();
                if (wallPaintChanged) commitEditorState();
            } else if (currentTool === 'freehand' && isDrawing) {
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
                const my = (e.clientY - rect.top) * (canvas.height / rect.height);
                const last = freehandPts[freehandPts.length - 1];
                if (!last || Math.abs(last.x - mx) > 1 || Math.abs(last.y - my) > 1) {
                    freehandPts.push({ x: mx, y: my });
                }
                isDrawing = false;
                if (freehandPts.length >= 3) freehandToSections(freehandPts);
                freehandPts = [];
                updatePreview();
            }
        });

        canvas.addEventListener('mouseleave', () => {
            if (isPanning) {
                isPanning = false;
                canvas.style.cursor = currentTool === 'pan' ? 'grab' : 'default';
            }
            if (isPaintingWall) {
                isPaintingWall = false;
                const segments = getCustomWallSegmentsFromStroke(wallPenPts);
                if (segments.length) {
                    customWalls.push(...segments);
                    wallPaintChanged = true;
                }
                wallPenPts = [];
                updatePreview();
                if (wallPaintChanged) commitEditorState();
            }
            if (isDrawing) {
                isDrawing = false;
                if (freehandPts.length >= 3) freehandToSections(freehandPts);
                freehandPts = [];
                updatePreview();
            }
            hoveredWall = -1;
        });

        function findNearestWall(mx, my, maxDist) {
            if (!lastBuildResult) return -1;
            const walls = lastBuildResult.walls;
            let best = -1, bestD = maxDist * maxDist;
            for (let i = 0; i < walls.length; i++) {
                const w = walls[i];
                const sx = lastTx(w[0]), sy = lastTy(w[1]);
                const ex = lastTx(w[2]), ey = lastTy(w[3]);
                const d2 = ptSegDist2(mx, my, sx, sy, ex, ey);
                if (d2 < bestD) { bestD = d2; best = i; }
            }
            return best;
        }

        function ptSegDist2(px, py, ax, ay, bx, by) {
            const dx = bx-ax, dy = by-ay, l2 = dx*dx+dy*dy;
            if (!l2) return (px-ax)*(px-ax)+(py-ay)*(py-ay);
            let t = ((px-ax)*dx+(py-ay)*dy)/l2;
            t = Math.max(0, Math.min(1, t));
            const cx = ax+t*dx, cy = ay+t*dy;
            return (px-cx)*(px-cx)+(py-cy)*(py-cy);
        }

        function highlightWall(wi) {
            const ctx = canvas.getContext('2d');
            const w = lastBuildResult.walls[wi];
            ctx.save();
            ctx.strokeStyle = erasedWalls.has(wi) ? '#00ff88' : '#ff0000';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(lastTx(w[0]), lastTy(w[1]));
            ctx.lineTo(lastTx(w[2]), lastTy(w[3]));
            ctx.stroke();
            ctx.restore();
        }

        function drawFreehandOverlay() {
            const ctx = canvas.getContext('2d');
            if (freehandPts.length < 2) return;
            const drawWidth = getDrawWidth();
            const corridorScreenWidth = Math.max(8, drawWidth * currentPreviewScale);
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 204, 0, 0.22)';
            ctx.lineWidth = corridorScreenWidth;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(freehandPts[0].x, freehandPts[0].y);
            for (let i = 1; i < freehandPts.length; i++) {
                ctx.lineTo(freehandPts[i].x, freehandPts[i].y);
            }
            ctx.stroke();
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = Math.max(2, Math.min(8, corridorScreenWidth * 0.14));
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(freehandPts[0].x, freehandPts[0].y);
            for (let i = 1; i < freehandPts.length; i++)
                ctx.lineTo(freehandPts[i].x, freehandPts[i].y);
            ctx.stroke();
            // Snap-to-close indicator: green circle on start when cursor is near
            if (freehandPts.length > 10) {
                const last = freehandPts[freehandPts.length - 1];
                const dx = last.x - freehandPts[0].x, dy = last.y - freehandPts[0].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const snapRadius = Math.max(18, freehandCloseScreenPx);
                if (dist < snapRadius) {
                    ctx.setLineDash([]);
                    ctx.strokeStyle = '#00ff66';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(freehandPts[0].x, freehandPts[0].y, snapRadius * 0.5, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = '#00ff66';
                    ctx.globalAlpha = 0.3;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            ctx.restore();
        }

        function findNearestSectionOnTrack(mx, my) {
            if (!lastBuildResult || !lastBuildResult.waypoints || !lastBuildResult.waypoints.length) return -1;
            const wps = lastBuildResult.waypoints;
            const secOf = lastBuildResult.secOf || [];
            const trackW = parseFloat(document.getElementById('propWidth').value) || 70;

            let bestI = -1;
            let bestD2 = Infinity;
            for (let i = 0; i < wps.length; i++) {
                const sx = lastTx(wps[i][0]);
                const sy = lastTy(wps[i][1]);
                const d2 = (mx - sx) * (mx - sx) + (my - sy) * (my - sy);
                if (d2 < bestD2) { bestD2 = d2; bestI = i; }
            }

            if (bestI < 0) return -1;

            // Require click reasonably close to the track centerline
            const pxRadius = Math.max(10, (trackW * 0.5) * Math.abs(lastTx(1) - lastTx(0)) + 6);
            if (bestD2 > pxRadius * pxRadius) return -1;

            const sec = secOf[bestI];
            if (typeof sec === 'number' && sec >= 0 && sec < sections.length) return sec;
            return -1;
        }
    })();

    // ═══════════════════════════════════════════════════════════
    // Ramer-Douglas-Peucker line simplification
    // ═══════════════════════════════════════════════════════════
    function rdpSimplify(pts, epsilon) {
        if (pts.length <= 2) return pts.slice();
        // Find the point farthest from the line (first → last)
        const first = pts[0], last = pts[pts.length - 1];
        let maxDist = 0, maxIdx = 0;
        const dx = last.x - first.x, dy = last.y - first.y;
        const lenSq = dx * dx + dy * dy;
        for (let i = 1; i < pts.length - 1; i++) {
            let dist;
            if (lenSq === 0) {
                dist = Math.sqrt((pts[i].x - first.x) ** 2 + (pts[i].y - first.y) ** 2);
            } else {
                const t = Math.max(0, Math.min(1, ((pts[i].x - first.x) * dx + (pts[i].y - first.y) * dy) / lenSq));
                const px = first.x + t * dx, py = first.y + t * dy;
                dist = Math.sqrt((pts[i].x - px) ** 2 + (pts[i].y - py) ** 2);
            }
            if (dist > maxDist) { maxDist = dist; maxIdx = i; }
        }
        if (maxDist > epsilon) {
            const left = rdpSimplify(pts.slice(0, maxIdx + 1), epsilon);
            const right = rdpSimplify(pts.slice(maxIdx), epsilon);
            return left.slice(0, -1).concat(right);
        }
        return [first, last];
    }

    function normalizeAngleRad(angle) {
        while (angle > Math.PI) angle -= Math.PI * 2;
        while (angle < -Math.PI) angle += Math.PI * 2;
        return angle;
    }

    function coalesceShortSegments(pts, minSegmentLen, maxTurnDeg = 35) {
        if (pts.length <= 2) return pts.slice();

        const out = [pts[0]];
        const maxTurn = maxTurnDeg * Math.PI / 180;
        let anchor = pts[0];
        let i = 1;

        while (i < pts.length) {
            let candidate = pts[i];
            let j = i;

            while (j < pts.length - 1) {
                const dist = Math.hypot(candidate.x - anchor.x, candidate.y - anchor.y);
                if (dist >= minSegmentLen) break;

                const next = pts[j + 1];
                const curHeading = Math.atan2(candidate.y - anchor.y, candidate.x - anchor.x);
                const nextHeading = Math.atan2(next.y - anchor.y, next.x - anchor.x);
                if (dist > minSegmentLen * 0.45 && Math.abs(normalizeAngleRad(nextHeading - curHeading)) > maxTurn) {
                    break;
                }

                candidate = next;
                j++;
            }

            if (candidate !== out[out.length - 1]) {
                out.push(candidate);
                anchor = candidate;
            }
            i = Math.max(j + 1, i + 1);
        }

        const last = pts[pts.length - 1];
        const tail = out[out.length - 1];
        if (tail.x !== last.x || tail.y !== last.y) out.push(last);
        return out;
    }

    // ═══════════════════════════════════════════════════════════
    // Freehand → sections conversion
    // ═══════════════════════════════════════════════════════════
    function freehandToSections(pts) {
        // Snap-to-close: check in screen coordinates (same as the green circle indicator)
        const CLOSE_SCREEN_PX = Math.max(18, freehandCloseScreenPx);
        let isClosed = false;
        let closeStartPt = null;
        let closeEndPt = null;
        if (pts.length >= 10) {
            const last = pts[pts.length - 1], first = pts[0];
            const sd = Math.sqrt((last.x - first.x) ** 2 + (last.y - first.y) ** 2);
            if (sd < CLOSE_SCREEN_PX) {
                closeStartPt = { x: last.x, y: last.y };
                closeEndPt = { x: first.x, y: first.y };
                isClosed = true;
            }
        }

        // Convert screen points back to track coords
        const tpts = pts.map(p => ({ x: lastTx.inv(p.x), y: lastTy.inv(p.y) }));
        if (tpts.length < 4) return;

        // ── 1. Close the loop: draw a line from end back to start ──
        if (isClosed && closeStartPt && closeEndPt) {
            const start = { x: lastTx.inv(closeStartPt.x), y: lastTy.inv(closeStartPt.y) };
            const end = { x: lastTx.inv(closeEndPt.x), y: lastTy.inv(closeEndPt.y) };
            const closeDist = Math.sqrt((end.x - start.x) ** 2 + (end.y - start.y) ** 2);
            // Insert evenly spaced points along a straight line from actual end → start
            const n = Math.max(2, Math.round(closeDist / 10));
            for (let i = 1; i <= n; i++) {
                const t = i / n;
                tpts.push({ x: start.x + (end.x - start.x) * t, y: start.y + (end.y - start.y) * t });
            }
        }

        // ── 2. Simplify lightly, preserving the pen path ──
        const simplifyEpsilon = Math.max(2, getDrawWidth() * 0.08);
        const simplified = rdpSimplify(tpts, simplifyEpsilon);
        const minSegmentLen = Math.max(10, getDrawWidth() * 0.65);
        const cleaned = coalesceShortSegments(simplified, minSegmentLen);
        if (cleaned.length < 2) return;

        // ── 3. Convert the simplified polyline into short straights with heading changes ──
        const segs = [];
        for (let i = 0; i < cleaned.length - 1; i++) {
            const dx = cleaned[i + 1].x - cleaned[i].x;
            const dy = cleaned[i + 1].y - cleaned[i].y;
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len < 6) continue;
            segs.push({ len, heading: Math.atan2(dy, dx) });
        }
        if (!segs.length) return;

        const newSections = [];
        freehandStartAngle = Math.round(segs[0].heading * 180 / Math.PI);
        let prevHeading = segs[0].heading;
        newSections.push({ type: 'straight', length: Math.round(segs[0].len), walls: false, hazards: [] });

        for (let i = 1; i < segs.length; i++) {
            const rotateDeg = Math.round(normalizeAngleRad(segs[i].heading - prevHeading) * 180 / Math.PI);
            const section = { type: 'straight', length: Math.round(segs[i].len), walls: false, hazards: [] };
            if (Math.abs(rotateDeg) > 0) section.rotate = rotateDeg;
            newSections.push(section);
            prevHeading = segs[i].heading;
        }

        if (newSections.length === 0) return;

        const previewBuild = buildTrack({
            name: 'Freehand Preview',
            startX: 400,
            startY: 500,
            startAngle: freehandStartAngle,
            trackWidth: getDrawWidth(),
            lapCount: parseInt(document.getElementById('propLaps').value, 10) || 3,
            truckScale: parseFloat(document.getElementById('propTruckScale').value) || 1,
            walls: document.getElementById('propWalls').value,
            colors: {
                bg: document.getElementById('colBg').value,
                track: document.getElementById('colTrack').value,
                border: document.getElementById('colBorder').value,
                grass: document.getElementById('colGrass').value,
            },
            sections: newSections,
        });
        if (previewBuild.waypoints.length > 0) {
            const firstWp = previewBuild.waypoints[0];
            const lastWp = previewBuild.waypoints[Math.max(0, previewBuild.waypoints.length - 1)];
            const dxToStart = firstWp[0] - previewBuild.endX;
            const dyToStart = firstWp[1] - previewBuild.endY;
            const closeLen = Math.sqrt(dxToStart * dxToStart + dyToStart * dyToStart);
            if (closeLen > 1) {
                const lastHeading = Math.atan2(previewBuild.endY - lastWp[1], previewBuild.endX - lastWp[0]);
                const targetHeading = Math.atan2(dyToStart, dxToStart);
                const rotateDeg = Math.round(normalizeAngleRad(targetHeading - lastHeading) * 180 / Math.PI);
                const connector = { type: 'straight', length: Math.round(closeLen), walls: false, hazards: [] };
                if (Math.abs(rotateDeg) > 0) connector.rotate = rotateDeg;
                newSections.push(connector);
            }
        }

        // Replace current sections confirmation
        if (sections.length > 0 && !confirm('Replace current sections with freehand drawing?')) return;
        sections = newSections;
        erasedWalls.clear();
        customStartLineIdx = 0;
        selIdx = -1;
        renderSections();
        updatePreview();
        commitEditorState();
    }

    // ═══════════════════════════════════════════════════════════
    // Keyboard shortcuts
    // ═══════════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if ((e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) { e.preventDefault(); undoEdit(); return; }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && (e.key === 'z' || e.key === 'Z')))) { e.preventDefault(); redoEdit(); return; }
        if (e.key === 's' || e.key === 'S') { e.preventDefault(); addSection('straight'); }
        if (e.key === 't' || e.key === 'T') { e.preventDefault(); addSection('turn'); }
        if (e.key === 'h' || e.key === 'H') { e.preventDefault(); setTool('pan'); }
        if (e.key === 'w' || e.key === 'W') { e.preventDefault(); setTool('paintWall'); }
        if (e.key === 'Delete' && selIdx >= 0) { delSection(selIdx); }
        if (e.key === 'd' || e.key === 'D') { if (selIdx >= 0) dupSection(selIdx); }
        if (e.key === 'ArrowUp' && e.ctrlKey && selIdx > 0) { e.preventDefault(); moveSection(selIdx, -1); }
        if (e.key === 'ArrowDown' && e.ctrlKey && selIdx < sections.length-1) { e.preventDefault(); moveSection(selIdx, 1); }
        if (e.key === 'ArrowUp' && !e.ctrlKey && selIdx > 0) { e.preventDefault(); selSection(selIdx-1); }
        if (e.key === 'ArrowDown' && !e.ctrlKey && selIdx < sections.length-1) { e.preventDefault(); selSection(selIdx+1); }
    });

    document.addEventListener('change', e => {
        if (!e.target.closest('#left-panel')) return;
        if (e.target.id === 'showCenterline') return;
        commitEditorState();
    }, true);

    // ═══════════════════════════════════════════════════════════
    // Init — load oval template
    // ═══════════════════════════════════════════════════════════
    updateZoomLabel();
    syncDrawWidth(70, false);
    applyDef({ ...TEMPLATES.oval, startX:400, startY:500, startAngle:-90 }, { clearLoadedFile: true, markClean: true });
    </script>
</body>
