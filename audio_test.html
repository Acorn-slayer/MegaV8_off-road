<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Test</title>
    <style>
        body { background: #222; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 40px; }
        button { font-size: 20px; padding: 15px 30px; margin: 10px; cursor: pointer; border: none; border-radius: 8px; color: #fff; }
        .init { background: #e44; }
        .test { background: #38a; }
        #log { text-align: left; background: #111; padding: 15px; margin: 20px auto; max-width: 600px; font-family: monospace; font-size: 14px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Web Audio Test Page</h1>
    <p>Click Init first (must be a user gesture), then try each sound.</p>

    <button class="init" onclick="initAudio()">1. Init AudioContext</button>
    <br>
    <button class="test" onclick="testTone()">Tone (440 Hz)</button>
    <button class="test" onclick="testChirp()">Chirp</button>
    <button class="test" onclick="testNoise()">Noise</button>
    <button class="test" onclick="testJingle()">Mario Jingle</button>

    <div id="log">Click Init to start...\n</div>

    <script>
        let ctx = null;

        function log(msg) {
            const el = document.getElementById('log');
            el.textContent += msg + '\n';
            el.scrollTop = el.scrollHeight;
        }

        function initAudio() {
            try {
                if (!ctx) {
                    ctx = new (window.AudioContext || window.webkitAudioContext)();
                    log('Created AudioContext, sampleRate=' + ctx.sampleRate);
                }
                log('State before resume: ' + ctx.state);
                ctx.resume().then(() => {
                    log('State after resume: ' + ctx.state);
                }).catch(e => {
                    log('Resume failed: ' + e.message);
                });
            } catch (e) {
                log('ERROR creating AudioContext: ' + e.message);
            }
        }

        function testTone() {
            if (!ctx || ctx.state !== 'running') { log('Init first! State=' + (ctx ? ctx.state : 'null')); return; }
            log('Playing 440 Hz tone for 0.5s...');
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 440;
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.connect(gain).connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
            log('  ...scheduled at t=' + ctx.currentTime.toFixed(3));
        }

        function testChirp() {
            if (!ctx || ctx.state !== 'running') { log('Init first!'); return; }
            log('Playing chirp...');
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            osc.connect(gain).connect(ctx.destination);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.2);
        }

        function testNoise() {
            if (!ctx || ctx.state !== 'running') { log('Init first!'); return; }
            log('Playing noise burst...');
            const bufferSize = ctx.sampleRate * 0.15;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            }
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            src.connect(gain).connect(ctx.destination);
            src.start();
        }

        function testJingle() {
            if (!ctx || ctx.state !== 'running') { log('Init first!'); return; }
            log('Playing Mario jingle...');
            const melody = [
                { freq: 659, time: 0.00, dur: 0.10 },
                { freq: 659, time: 0.15, dur: 0.10 },
                { freq: 659, time: 0.40, dur: 0.10 },
                { freq: 523, time: 0.55, dur: 0.10 },
                { freq: 659, time: 0.70, dur: 0.15 },
                { freq: 784, time: 0.95, dur: 0.25 },
                { freq: 392, time: 1.40, dur: 0.25 },
            ];
            melody.forEach(({ freq, time, dur }) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.12, ctx.currentTime + time);
                gain.gain.setValueAtTime(0.12, ctx.currentTime + time + dur * 0.8);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time + dur);
                osc.connect(gain).connect(ctx.destination);
                osc.start(ctx.currentTime + time);
                osc.stop(ctx.currentTime + time + dur);
            });
        }
    </script>
</body>
</html>
