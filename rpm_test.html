<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine RPM Tuner</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: monospace; padding: 30px; }
        h1 { color: #ffcc00; }
        .control { margin: 20px 0; }
        label { display: inline-block; width: 200px; font-size: 16px; }
        input[type="range"] { width: 300px; vertical-align: middle; }
        .value { display: inline-block; width: 80px; color: #0f0; font-size: 18px; font-weight: bold; }
        button { font-size: 18px; padding: 12px 25px; margin: 8px; cursor: pointer; border: none; border-radius: 6px; color: #fff; }
        .init { background: #e44; }
        .play { background: #38a; }
        .stop { background: #666; }
        #speedSlider { width: 500px; }
        .info { color: #888; font-size: 13px; margin-top: 5px; }
        hr { border-color: #333; margin: 25px 0; }
    </style>
</head>
<body>
    <h1>Engine RPM Tuner</h1>
    <p>Adjust idle and max RPM, then use the speed slider to hear the result.</p>

    <button class="init" onclick="initAudio()">Init Audio</button>
    <button class="play" onclick="startEngine()">Start Engine</button>
    <button class="stop" onclick="stopEngine()">Stop Engine</button>
    <hr>

    <div class="control">
        <label>Idle RPM (playback rate):</label>
        <input type="range" id="idleRPM" min="0.1" max="2.0" step="0.05" value="0.4">
        <span class="value" id="idleVal">0.4x</span>
        <div class="info">Lower = deeper rumble at standstill</div>
    </div>

    <div class="control">
        <label>Max RPM (playback rate):</label>
        <input type="range" id="maxRPM" min="1.0" max="10.0" step="0.1" value="5.0">
        <span class="value" id="maxVal">5.0x</span>
        <div class="info">Higher = more screaming at top speed</div>
    </div>

    <div class="control">
        <label>Max Volume:</label>
        <input type="range" id="maxVol" min="0.1" max="1.0" step="0.05" value="0.65">
        <span class="value" id="volVal">0.65</span>
    </div>

    <hr>

    <div class="control">
        <label>Simulated Speed:</label>
        <input type="range" id="speedSlider" min="0" max="100" step="1" value="0">
        <span class="value" id="speedVal">0%</span>
        <div class="info">Drag to simulate driving from idle to top speed</div>
    </div>

    <div class="control" style="margin-top: 15px;">
        <label>Current playback rate:</label>
        <span class="value" id="currentRate" style="color: #ff0;">—</span>
    </div>

    <hr>
    <h2 style="color: #ffcc00;">Current values for code:</h2>
    <pre id="codeOutput" style="background: #222; padding: 15px; border-radius: 6px; font-size: 14px; color: #0f0;"></pre>

    <script>
        let ctx = null;
        let engineNode = null;
        let engineGain = null;
        let engineBuffer = null;

        function initAudio() {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            ctx.resume().then(async () => {
                // Load the engine sample
                const response = await fetch('assets/audio/engine_idle_new.mp3');
                const arrayBuffer = await response.arrayBuffer();
                engineBuffer = await ctx.decodeAudioData(arrayBuffer);
                document.getElementById('codeOutput').textContent = 'Audio loaded! Click Start Engine.';
            });
        }

        function startEngine() {
            if (!ctx || !engineBuffer) { alert('Click Init Audio first'); return; }
            stopEngine();
            engineGain = ctx.createGain();
            engineGain.gain.value = 0.3;
            engineGain.connect(ctx.destination);
            engineNode = ctx.createBufferSource();
            engineNode.buffer = engineBuffer;
            engineNode.loop = true;
            engineNode.connect(engineGain);
            engineNode.start();
        }

        function stopEngine() {
            if (engineNode) { try { engineNode.stop(); } catch(e) {} }
            engineNode = null;
            engineGain = null;
        }

        // Update loop
        function updateDisplay() {
            const idle = parseFloat(document.getElementById('idleRPM').value);
            const max = parseFloat(document.getElementById('maxRPM').value);
            const vol = parseFloat(document.getElementById('maxVol').value);
            const speed = parseInt(document.getElementById('speedSlider').value) / 100;

            document.getElementById('idleVal').textContent = idle.toFixed(2) + 'x';
            document.getElementById('maxVal').textContent = max.toFixed(1) + 'x';
            document.getElementById('volVal').textContent = vol.toFixed(2);
            document.getElementById('speedVal').textContent = Math.round(speed * 100) + '%';

            const rate = idle + speed * (max - idle);
            const volume = 0.1 + speed * vol;

            document.getElementById('currentRate').textContent = rate.toFixed(2) + 'x';

            if (engineNode && engineGain) {
                engineNode.playbackRate.value = rate;
                engineGain.gain.value = volume;
            }

            document.getElementById('codeOutput').textContent =
                `// Paste these into SoundFX.js updateEngine():\n` +
                `const idlePitch = ${idle.toFixed(2)};\n` +
                `const maxPitch  = ${max.toFixed(1)};\n` +
                `// Volume: 0.10 idle → ${vol.toFixed(2)} top speed\n` +
                `this.engineGain.gain.value = 0.10 + ratio * ${vol.toFixed(2)};`;

            requestAnimationFrame(updateDisplay);
        }
        updateDisplay();
    </script>
</body>
</html>
